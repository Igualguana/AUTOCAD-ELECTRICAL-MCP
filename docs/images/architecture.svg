<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI,system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="900" height="560" fill="#0d1117" rx="12"/>
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">AUTOCAD-ELECTRICAL-MCP — System Architecture</text>

  <!-- MODE A box -->
  <rect x="30" y="70" width="200" height="80" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="130" y="98" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">MODE A</text>
  <text x="130" y="116" text-anchor="middle" fill="#e6edf3" font-size="12">Claude Code CLI</text>
  <text x="130" y="133" text-anchor="middle" fill="#8b949e" font-size="10">MCP / stdio transport</text>

  <!-- MODE B box -->
  <rect x="670" y="70" width="200" height="80" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="770" y="98" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">MODE B</text>
  <text x="770" y="116" text-anchor="middle" fill="#e6edf3" font-size="12">Web Dashboard</text>
  <text x="770" y="133" text-anchor="middle" fill="#8b949e" font-size="10">http://localhost:8080</text>

  <!-- Arrows mode A down -->
  <line x1="130" y1="150" x2="200" y2="210" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrows mode B down -->
  <line x1="770" y1="150" x2="700" y2="210" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MCP Server -->
  <rect x="100" y="210" width="200" height="70" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="1"/>
  <text x="200" y="238" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="600">src/server.py</text>
  <text x="200" y="255" text-anchor="middle" fill="#e6edf3" font-size="11">FastMCP Server</text>
  <text x="200" y="271" text-anchor="middle" fill="#8b949e" font-size="10">46 MCP tools registered</text>

  <!-- FastAPI -->
  <rect x="600" y="210" width="200" height="70" rx="8" fill="#1c2128" stroke="#3fb950" stroke-width="1"/>
  <text x="700" y="238" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="600">web/backend/app.py</text>
  <text x="700" y="255" text-anchor="middle" fill="#e6edf3" font-size="11">FastAPI Backend</text>
  <text x="700" y="271" text-anchor="middle" fill="#8b949e" font-size="10">REST API + chat router</text>

  <!-- Providers box -->
  <rect x="310" y="190" width="280" height="110" rx="8" fill="#1c2128" stroke="#d29922" stroke-width="1"/>
  <text x="450" y="215" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="600">src/providers/</text>
  <text x="360" y="237" fill="#8b949e" font-size="10">• claude.py (Anthropic SDK)</text>
  <text x="360" y="254" fill="#8b949e" font-size="10">• ollama.py (local Ollama)</text>
  <text x="360" y="271" fill="#8b949e" font-size="10">• openai_compat.py (OpenAI/Groq/LMStudio)</text>
  <text x="360" y="288" fill="#8b949e" font-size="10">• base.py (abstract interface)</text>

  <!-- Arrows to providers -->
  <line x1="300" y1="250" x2="310" y2="250" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="250" x2="590" y2="250" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tools layer -->
  <rect x="100" y="330" width="700" height="100" rx="8" fill="#1c2128" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="450" y="355" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700">src/tools/  —  46 registered tools</text>
  <text x="160" y="378" text-anchor="middle" fill="#58a6ff" font-size="10">Drawing (8)</text>
  <text x="160" y="393" text-anchor="middle" fill="#8b949e" font-size="9">line,circle,arc,text,rect,</text>
  <text x="160" y="406" text-anchor="middle" fill="#8b949e" font-size="9">polyline,zoom,layer</text>

  <text x="290" y="378" text-anchor="middle" fill="#f0883e" font-size="10">Drawing3D (9)</text>
  <text x="290" y="393" text-anchor="middle" fill="#8b949e" font-size="9">box,sphere,cylinder,</text>
  <text x="290" y="406" text-anchor="middle" fill="#8b949e" font-size="9">cone,line3d,poly3d,ucs</text>

  <text x="450" y="378" text-anchor="middle" fill="#f0883e" font-size="10">Electrical (7)</text>
  <text x="450" y="393" text-anchor="middle" fill="#8b949e" font-size="9">symbols,ladder,PLC,</text>
  <text x="450" y="406" text-anchor="middle" fill="#8b949e" font-size="9">xref,wire_number</text>

  <text x="610" y="378" text-anchor="middle" fill="#3fb950" font-size="10">Wires+Components (11)</text>
  <text x="610" y="393" text-anchor="middle" fill="#8b949e" font-size="9">draw,number,route,</text>
  <text x="610" y="406" text-anchor="middle" fill="#8b949e" font-size="9">CRUD,search,move</text>

  <text x="780" y="378" text-anchor="middle" fill="#76e3ea" font-size="10">Reports+Project (11)</text>
  <text x="780" y="393" text-anchor="middle" fill="#8b949e" font-size="9">BOM,wire list,terminal,</text>
  <text x="780" y="406" text-anchor="middle" fill="#8b949e" font-size="9">sync,open,close</text>

  <!-- Arrows to tools -->
  <line x1="200" y1="280" x2="250" y2="330" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="280" x2="650" y2="330" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="300" x2="450" y2="330" stroke="#d29922" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AutoCAD box -->
  <rect x="280" y="468" width="340" height="66" rx="8" fill="#1c2128" stroke="#f85149" stroke-width="2"/>
  <text x="450" y="494" text-anchor="middle" fill="#ff7b72" font-size="13" font-weight="700">AutoCAD Electrical 2025</text>
  <text x="450" y="514" text-anchor="middle" fill="#8b949e" font-size="10">Windows COM automation via pywin32</text>
  <text x="450" y="529" text-anchor="middle" fill="#8b949e" font-size="10">src/autocad/connection.py  (COM singleton)</text>

  <!-- Arrow tools to AutoCAD -->
  <line x1="450" y1="430" x2="450" y2="468" stroke="#bc8cff" stroke-width="2" marker-end="url(#arr)"/>
</svg>